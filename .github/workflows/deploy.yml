name: Test and Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: test-secret-key-for-ci
      DJANGO_DEBUG: "True"
      DB_ENGINE: sqlite
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential default-libmysqlclient-dev pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django tests
        run: python manage.py test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    env:
      CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT || '22' }}
      CPANEL_APP_DIR: ${{ secrets.CPANEL_APP_DIR }}
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.CPANEL_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$CPANEL_SSH_PORT" "${{ secrets.CPANEL_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on cPanel
        run: |
          ssh -p "$CPANEL_SSH_PORT" "${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}" \
            "cd '$CPANEL_APP_DIR' && git pull --ff-only && bash scripts/deploy_cpanel.sh"

