{% extends "groupcore/auth_base.html" %}
{% block title %}Set New Password{% endblock %}
{% block header %}Set New Password{% endblock %}
{% block subheader %}Enter and confirm your new password.{% endblock %}
{% block form %}
<form method="post">
  {% csrf_token %}
  <div class="mb-3 text-start">
    <label for="id_password1" class="form-label">New Password</label>
    <input type="password" id="id_password1" name="password1" class="form-control" required />
  </div>
  <div class="mb-3 text-start">
    <label for="id_password2" class="form-label">Confirm Password</label>
    <input type="password" id="id_password2" name="password2" class="form-control" required />
  </div>
  <button type="submit" class="btn btn-primary mb-3">
    <i class="bi bi-key me-2"></i> Reset Password
  </button>
</form>
{% endblock %}
