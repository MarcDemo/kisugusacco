{% extends "groupcore/auth_base.html" %}
{% block title %}Verify Code{% endblock %}
{% block header %}Verify Code{% endblock %}
{% block subheader %}Enter the verification code sent to your email.{% endblock %}
{% block form %}
<form method="post">
  {% csrf_token %}
  <div class="mb-3 text-start">
    <label for="id_code" class="form-label">Verification Code</label>
    <input type="text" id="id_code" name="code" class="form-control" placeholder="Enter code" required />
  </div>
  <button type="submit" class="btn btn-success mb-3">
    <i class="bi bi-shield-check me-2"></i> Verify
  </button>
</form>
{% endblock %}
