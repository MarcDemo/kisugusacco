{% extends "groupcore/auth_base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block header %}Forgot Password{% endblock %}
{% block subheader %}Enter your registered email to receive a verification code.{% endblock %}
{% block form %}
<form method="post">
  {% csrf_token %}
  <div class="mb-3 text-start">
    <label for="id_email" class="form-label">Email Address</label>
    <input type="email" id="id_email" name="email" class="form-control" placeholder="Enter your email" required />
  </div>
  <button type="submit" class="btn btn-primary mb-3">
    <i class="bi bi-envelope me-2"></i> Send Code
  </button>
</form>
{% endblock %}
